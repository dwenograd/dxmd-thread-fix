; dxmd-thread-fix configuration
;
; This file is read once when DXMD.exe starts. Edit values, then relaunch
; the game.

[ThreadFix]

; LogicalProcessors: report this many CPUs to the game.
;
; DXMD (and the bink/amd_ags middleware) crashes on systems with high
; logical-processor counts. This shim lies to the CPU-detection APIs so
; the game sizes its thread pool sanely.
;
; Community-validated sweet spot: 8.  Some users report stability at 12.
; If your CPU has fewer logical processors than this value, the real
; count is reported (we never lie *upward*).
;
; Valid range: 1 .. 64. Larger values are silently clamped (we report
; a single Windows processor group, which can hold up to 64 logical
; processors).
LogicalProcessors=8

; ClampAffinity: 0 (default) does NOT install the SetThreadAffinityMask
; hook at all - the DLL doesn't observe or alter affinity calls. Set
; to 1 only if you're specifically troubleshooting affinity-related
; crashes: this installs the hook and clamps any requested mask into
; the first LogicalProcessors bits if it falls outside that range.
; With ClampAffinity=1, the log shows the first affinity call at
; LogLevel=1 (with a [clamped] tag if a clamp happened) and every
; affinity call at LogLevel=2.
ClampAffinity=0

; LogLevel: 0 = silent, 1 = startup + first-hit per API (default),
;           2 = verbose (every hooked call).
; Log file: dxmd-thread-fix.log, next to this INI.
LogLevel=1
